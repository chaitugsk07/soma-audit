manifest_version: 1
versions:
  - version: 1
    description: "Initial audit events table"
    migrations:
      - file: "20260626_01_audit-events.sql"
        created: "2026-06-26"
        author: "soma-audit"
        why: "Create append-only HMAC-chained audit events table"
  - version: 2
    description: "Chain-seal checkpoints"
    migrations:
      - file: "20260626_02_audit-chain-seals.sql"
        created: "2026-06-26"
